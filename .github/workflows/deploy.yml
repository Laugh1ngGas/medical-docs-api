name: Deploy Medical Docs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          path: medical-docs

      - name: Install dependencies
        run: |
          cd medical-docs
          npm install

      - name: Build project
        run: |
          cd medical-docs
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@4.1.5
        with:
          branch: main
          folder: medical-docs/dist
